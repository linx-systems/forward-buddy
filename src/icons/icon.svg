<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Rounded square background -->
  <rect width="128" height="128" rx="28" fill="#2563EB"/>
  <!-- Lighter top-left overlay for depth -->
  <rect width="128" height="128" rx="28" fill="#5BA8FA" opacity="0.35"/>

  <!-- Envelope body -->
  <rect x="20" y="36" width="64" height="48" rx="6" fill="#FFFFFF"/>

  <!-- Envelope flap -->
  <path d="M20,40 Q20,36 26,36 L78,36 Q84,36 84,40 L52,60 Z" fill="#E8EEFF"/>
  <!-- Flap crease -->
  <path d="M23,37 L52,58 L81,37" fill="none" stroke="#B8C8F0" stroke-width="1.2" stroke-linejoin="round"/>

  <!-- Letter lines -->
  <rect x="30" y="68" width="28" height="2.5" rx="1.25" fill="#C8D4F0"/>
  <rect x="30" y="74" width="18" height="2.5" rx="1.25" fill="#C8D4F0"/>

  <!-- Forward arrow circle -->
  <circle cx="88" cy="72" r="22" fill="#FFFFFF"/>
  <circle cx="88" cy="72" r="20" fill="#1D4ED8"/>
  <!-- Arrow -->
  <path d="M80,72 L93,72 M88,65 L96,72 L88,79" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
